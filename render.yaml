services:
  - type: web
    name: voxlume
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: APP_NAME
        value: VoxLume
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
